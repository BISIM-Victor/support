# Configuración de Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update  # Puedes cambiarlo a 'validate' si no deseas que se modifiquen las tablas automáticamente
spring.jpa.show-sql=true  # Esto es útil para depuración, muestra las consultas SQL ejecutadas
spring.jpa.properties.hibernate.format_sql=true  # Para formato más legible de las consultas SQL



# Conexiůn a la base de datos MySQL usando variables de entorno
# URL de la base de datos
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
# Usuario y contraseŮa de la base de datos
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
# Driver de la base de datos
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Configuraciůn de Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuraciůn del log (opcional)
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

